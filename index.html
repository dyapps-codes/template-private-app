<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Private App</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      #splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        background: #f8fafc;
        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
        z-index: 9999;
      }

      .app-splash-logo {
        font-size: 2rem;
        font-weight: 700;
        letter-spacing: 0;
        line-height: 1;
        color: #0f172a;
        position: relative;
      }

      .app-splash-logo::after {
        content: '';
        position: absolute;
        left: 0;
        right: 0;
        bottom: -10px;
        height: 2px;
        border-radius: 999px;
        background: #2563eb;
        transform-origin: left;
        animation: load 1.4s ease-in-out infinite;
      }

      .app-splash-sub {
        font-size: 0.7rem;
        font-weight: 500;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: #64748b;
      }

      @keyframes load {
        0%   { transform: scaleX(0.2); opacity: 0.35; }
        50%  { transform: scaleX(1); opacity: 1; }
        100% { transform: scaleX(0.2); opacity: 0.35; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="splash">
        <span class="app-splash-logo">Private App</span>
        <span class="app-splash-sub">Loading</span>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
